name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      KERNEL_TREE:
        description: 'Kernel Repository URL'
        default: 'https://github.com/pangomin/N0_Custom'
        required: true
        type: string
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        default: 'staging'
        required: true
        type: string
      DEVICE:
        description: 'Device Codename'
        default: 'vendor/alioth'
        required: true
        type: string
      ANYKERNEL:
        description: 'AnyKernel3 Repository'
        default: 'https://github.com/itisFarzin-Phone/AnyKernel3'
        required: false
        type: string
      ENABLE_KSU:
        description: 'Enable KernelSU'
        type: boolean
        default: false
      RELEASE:
        description: 'Create Release'
        type: boolean
        default: false

env:
  CLANG_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz
  GCC_ARM64: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
  GCC_ARM32: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
  BRANCH: android-msm-redbull-4.19-android14
  WORKDIR: ${{ github.workspace }}/build

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    permissions:
      contents: write
    
    steps:
      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flex \
            libncurses5-dev \
            gcc-aarch64-linux-gnu \
            git \
            make \
            wget \
            zip
          mkdir -p ${{ env.WORKDIR }}/{toolchain,kernel,out}
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Setup Toolchain
        working-directory: ${{ env.WORKDIR }}/toolchain
        run: |
          wget -q ${{ env.CLANG_URL }} -O clang.tar.gz
          mkdir clang && tar xf clang.tar.gz -C clang
          git clone --depth=1 ${{ env.GCC_ARM64 }} -b ${{ env.BRANCH }} gcc-arm64
          git clone --depth=1 ${{ env.GCC_ARM32 }} -b ${{ env.BRANCH }} gcc-arm32
          echo "PATH=$PWD/clang/bin:$PATH" >> $GITHUB_ENV
          rm clang.tar.gz

      - name: Clone Kernel
        working-directory: ${{ env.WORKDIR }}/kernel
        run: |
          git clone --depth=1 ${{ github.event.inputs.KERNEL_TREE }} -b ${{ github.event.inputs.KERNEL_BRANCH }} .
          if [ "${{ github.event.inputs.ENABLE_KSU }}" = "true" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          fi

      - name: Build Kernel
        working-directory: ${{ env.WORKDIR }}/kernel
        env:
          ARCH: arm64
          SUBARCH: ARM64
          KBUILD_BUILD_USER: github
          KBUILD_BUILD_HOST: actions
          CROSS_COMPILE: aarch64-linux-gnu-
        run: |
          make O=../out vendor/${{ github.event.inputs.DEVICE }}_defconfig
          make -j$(nproc --all) O=../out \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.WORKDIR }}/toolchain/gcc-arm64/bin/aarch64-linux-android- \
            CROSS_COMPILE_ARM32=${{ env.WORKDIR }}/toolchain/gcc-arm32/bin/arm-linux-androideabi-
          echo "BUILD_TIME=$(($(date +%s) - $START_TIME))" >> $GITHUB_ENV

      - name: Package Kernel
        if: success() && github.event.inputs.ANYKERNEL != ''
        working-directory: ${{ env.WORKDIR }}/out
        run: |
          git clone --depth=1 ${{ github.event.inputs.ANYKERNEL }} -b ${{ github.event.inputs.DEVICE }} anykernel
          cp arch/arm64/boot/Image* anykernel/
          cd anykernel
          zip -r9 ../kernel-${{ github.event.inputs.DEVICE }}${{ github.event.inputs.ENABLE_KSU == 'true' && '-ksu' || '' }}.zip *
          echo "ZIPNAME=kernel-${{ github.event.inputs.DEVICE }}${{ github.event.inputs.ENABLE_KSU == 'true' && '-ksu' || '' }}.zip" >> $GITHUB_ENV

      - name: Create Release
        if: success() && github.event.inputs.RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.WORKDIR }}/out/arch/arm64/boot/Image*
            ${{ env.WORKDIR }}/out/${{ env.ZIPNAME }}
          name: kernel-${{ github.event.inputs.DEVICE }}-${{ github.sha }}
          tag_name: ${{ github.sha }}
          body: |
            Device: ${{ github.event.inputs.DEVICE }}
            Branch: ${{ github.event.inputs.KERNEL_BRANCH }}
            Commit: ${{ github.sha }}
            KernelSU: ${{ github.event.inputs.ENABLE_KSU }}
            Build Time: ${{ env.BUILD_TIME }}s

      - name: Upload Artifacts
        if: success() && github.event.inputs.RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.DEVICE }}
          path: |
            ${{ env.WORKDIR }}/out/arch/arm64/boot/Image*
            ${{ env.WORKDIR }}/out/${{ env.ZIPNAME }}
          compression-level: 9
          retention-days: 7
